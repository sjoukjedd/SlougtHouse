name: iOS App Build

on:
  push:
    branches: [main]
    paths:
      - 'operations/ios_app/**'
  pull_request:
    branches: [main]
    paths:
      - 'operations/ios_app/**'

jobs:
  build:
    name: VUAMS iOS Build
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Homebrew packages
        id: cache-homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
          key: homebrew-xcodegen-${{ runner.os }}
          restore-keys: |
            homebrew-xcodegen-${{ runner.os }}

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &>/dev/null; then
            brew install xcodegen
          else
            echo "XcodeGen already available: $(xcodegen --version)"
          fi

      - name: Generate Xcode project
        working-directory: operations/ios_app
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('operations/ios_app/project.yml') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build (iOS Simulator, no signing)
        working-directory: operations/ios_app
        run: |
          set -o pipefail
          xcodebuild \
            -scheme VUAMS \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty --color || (cat /tmp/xcodebuild.log 2>/dev/null; exit 1)

      - name: Test (VUAMSTests, iOS Simulator)
        working-directory: operations/ios_app
        run: |
          set -o pipefail
          xcodebuild \
            -scheme VUAMSTests \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath /tmp/VUAMSTests.xcresult \
            test \
            | xcpretty --color || exit 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: /tmp/VUAMSTests.xcresult
          retention-days: 14

      - name: Report build status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Build succeeded for scheme VUAMS on iOS Simulator (iPhone 15, Debug)."
          else
            echo "Build FAILED for scheme VUAMS. Check xcodebuild output above."
            exit 1
          fi
