name: iOS Simulator App Build

on:
  push:
    branches: [main]
    paths:
      - 'operations/ios_simulator/**'
  pull_request:
    branches: [main]
    paths:
      - 'operations/ios_simulator/**'

jobs:
  build:
    name: VUAMSSim iOS Build
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Homebrew packages
        id: cache-homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
          key: homebrew-xcodegen-${{ runner.os }}
          restore-keys: |
            homebrew-xcodegen-${{ runner.os }}

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &>/dev/null; then
            brew install xcodegen
          else
            echo "XcodeGen already available: $(xcodegen --version)"
          fi

      - name: Generate Xcode project
        working-directory: operations/ios_simulator
        run: xcodegen generate

      - name: Build (iOS Simulator, no signing)
        working-directory: operations/ios_simulator
        run: |
          set -o pipefail
          xcodebuild \
            -scheme VUAMSSim \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty --color || (cat /tmp/xcodebuild.log 2>/dev/null; exit 1)

      - name: Report build status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Build succeeded for scheme VUAMSSim on iOS Simulator (iPhone 15, Debug)."
          else
            echo "Build FAILED for scheme VUAMSSim. Check xcodebuild output above."
            exit 1
          fi
