name: VUAMSSim
options:
  bundleIdPrefix: nl.vu-ams
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""  # in te vullen
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  VUAMSSim:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.md"
    info:
      path: VUAMSSim/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "VU-AMS Simulator gebruikt Bluetooth om het meetapparaat te emuleren."
        NSBluetoothPeripheralUsageDescription: "VU-AMS Simulator gebruikt Bluetooth peripheral mode om het meetapparaat te emuleren."
        UIBackgroundModes:
          - bluetooth-peripheral
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.vu-ams.simulator
        INFOPLIST_FILE: VUAMSSim/Info.plist
