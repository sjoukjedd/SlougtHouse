name: VUAMS
options:
  bundleIdPrefix: nl.vu-ams
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""  # in te vullen
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  VUAMS:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.md"
          - "**/*.md"
          - ".claude/"
          - WatchApp/
          - Tests/
      - path: Models
    info:
      path: VUAMS/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "VU-AMS gebruikt Bluetooth voor live signaalacquisitie van het meetapparaat."
        NSBluetoothPeripheralUsageDescription: "VU-AMS gebruikt Bluetooth voor live signaalacquisitie van het meetapparaat."
        UIBackgroundModes:
          - bluetooth-central
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.vu-ams.app
        INFOPLIST_FILE: VUAMS/Info.plist

  VUAMSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: DataBlocks.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.vu-ams.tests
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: VUAMS

  VUAMSWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp
    info:
      path: WatchApp/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: nl.vu-ams.app
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.vu-ams.app.watchkitapp
        INFOPLIST_FILE: WatchApp/Info.plist
    dependencies:
      - target: VUAMS
