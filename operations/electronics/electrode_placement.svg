<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 760" width="980" height="760" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="980" height="760" fill="#f7f8fa"/>

  <!-- Title -->
  <text x="490" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">VU-AMS — Electrode Placement</text>
  <text x="490" y="54" text-anchor="middle" font-size="12" fill="#64748b">Tetrapolar ICG (back injection / front sense) · 3-electrode ECG · RLD via back · E6/E7 SCL/EDA</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- FRONT VIEW                                    -->
  <!-- ══════════════════════════════════════════════ -->

  <text x="220" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#334155">FRONT</text>

  <!-- Head -->
  <ellipse cx="220" cy="118" rx="42" ry="50" fill="#f0d5b0" stroke="#b0a090" stroke-width="1.5"/>

  <!-- Neck -->
  <path d="M 203 165 L 237 165 L 241 200 L 199 200 Z" fill="#f0d5b0" stroke="#b0a090" stroke-width="1.5"/>

  <!-- Torso -->
  <path d="
    M 199 200
    Q 173 204 143 215
    Q 105 232 97 295
    L 97 490
    Q 130 520 220 522
    Q 310 520 343 490
    L 343 295
    Q 335 232 297 215
    Q 267 204 241 200
    Z
  " fill="#f0d5b0" stroke="#b0a090" stroke-width="1.5"/>

  <!-- Collar bones -->
  <path d="M 220 205 Q 178 213 150 223" stroke="#c8b090" stroke-width="1" fill="none"/>
  <path d="M 220 205 Q 262 213 290 223" stroke="#c8b090" stroke-width="1" fill="none"/>

  <!-- Sternum -->
  <line x1="220" y1="208" x2="220" y2="500" stroke="#d0bfa0" stroke-width="1" stroke-dasharray="4,5"/>

  <!-- Ribcage -->
  <path d="M 133 255 Q 220 240 307 255" stroke="#d8c8a8" stroke-width="1" fill="none"/>
  <path d="M 120 305 Q 220 288 320 305" stroke="#d8c8a8" stroke-width="1" fill="none"/>
  <path d="M 113 360 Q 220 342 327 360" stroke="#d8c8a8" stroke-width="1" fill="none"/>
  <path d="M 108 415 Q 220 396 332 415" stroke="#d8c8a8" stroke-width="1" fill="none"/>

  <!-- ── ECG lead wires (solid green) ── -->
  <!-- Device to solar plexus -->
  <line x1="220" y1="237" x2="220" y2="350" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Device to lower left rib -->
  <path d="M 208 230 Q 175 300 163 400" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,4" fill="none"/>
  <!-- Solar plexus to lower left rib -->
  <path d="M 209 370 Q 190 395 170 408" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,4" fill="none"/>

  <!-- ICG sense wire (blue, separate) -->
  <line x1="217" y1="237" x2="217" y2="350" stroke="#2563eb" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- SCL wire between E6 and E7 -->
  <line x1="175" y1="323" x2="199" y2="323" stroke="#be185d" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ── E1: Device electrode (between collarbones) ── -->
  <circle cx="220" cy="219" r="20" fill="#2563eb" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="220" y="214" text-anchor="middle" font-size="9" font-weight="bold" fill="white">DEVICE</text>
  <text x="220" y="225" text-anchor="middle" font-size="8" fill="white">E1</text>
  <!-- Device housing outline -->
  <rect x="200" y="199" width="40" height="40" rx="6" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-dasharray="4,2"/>

  <!-- ── E2: Solar plexus ── -->
  <circle cx="220" cy="364" r="16" fill="#0284c7" stroke="#0369a1" stroke-width="2.5"/>
  <text x="220" y="359" text-anchor="middle" font-size="8" font-weight="bold" fill="white">E2</text>
  <text x="220" y="370" text-anchor="middle" font-size="8" fill="white">solar pl.</text>

  <!-- ── E3: Lower left rib ── -->
  <circle cx="158" cy="415" r="16" fill="#7c3aed" stroke="#6d28d9" stroke-width="2.5"/>
  <text x="158" y="410" text-anchor="middle" font-size="8" font-weight="bold" fill="white">E3</text>
  <text x="158" y="421" text-anchor="middle" font-size="8" fill="white">left rib</text>

  <!-- ── E6: SCL electrode (left chest, upper) ── -->
  <circle cx="175" cy="313" r="12" fill="#be185d" stroke="#9d174d" stroke-width="2.5"/>
  <text x="175" y="309" text-anchor="middle" font-size="8" font-weight="bold" fill="white">E6</text>
  <text x="175" y="319" text-anchor="middle" font-size="7" fill="white">SCL</text>

  <!-- ── E7: SCL electrode (left chest, lower) ── -->
  <circle cx="199" cy="313" r="12" fill="#db2777" stroke="#9d174d" stroke-width="2.5"/>
  <text x="199" y="309" text-anchor="middle" font-size="8" font-weight="bold" fill="white">E7</text>
  <text x="199" y="319" text-anchor="middle" font-size="7" fill="white">SCL</text>

  <!-- Label E1 -->
  <rect x="258" y="197" width="168" height="54" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="266" y="213" font-size="11" font-weight="bold" fill="#1e40af">E1 · Between collarbones</text>
  <text x="266" y="227" font-size="10" fill="#1e40af">ICG Vsense⁺</text>
  <text x="266" y="241" font-size="10" fill="#1e40af">ECG electrode</text>
  <line x1="240" y1="219" x2="258" y2="219" stroke="#1e40af" stroke-width="1.2"/>

  <!-- Label E2 -->
  <rect x="240" y="348" width="148" height="32" rx="5" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.2"/>
  <text x="248" y="362" font-size="11" font-weight="bold" fill="#0369a1">E2 · Solar plexus</text>
  <text x="248" y="375" font-size="10" fill="#0369a1">ICG Vsense⁻  ·  ECG electrode</text>
  <line x1="236" y1="364" x2="240" y2="364" stroke="#0369a1" stroke-width="1.2"/>

  <!-- Label E3 -->
  <rect x="50" y="440" width="152" height="32" rx="5" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="58" y="454" font-size="11" font-weight="bold" fill="#6d28d9">E3 · Lower left rib</text>
  <text x="58" y="468" font-size="10" fill="#6d28d9">ECG electrode only</text>
  <line x1="155" y1="431" x2="140" y2="454" stroke="#6d28d9" stroke-width="1.2"/>

  <!-- Label E6/E7 -->
  <rect x="50" y="282" width="110" height="42" rx="5" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.2"/>
  <text x="58" y="296" font-size="10" font-weight="bold" fill="#9d174d">E6 · E7 · Left chest</text>
  <text x="58" y="308" font-size="9" fill="#9d174d">SCL/EDA pair</text>
  <text x="58" y="319" font-size="9" fill="#9d174d">~2 cm spacing</text>
  <line x1="160" y1="310" x2="163" y2="310" stroke="#9d174d" stroke-width="1.2"/>

  <!-- ECG triangle label -->
  <rect x="50" y="296" width="75" height="28" rx="3" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="57" y="308" font-size="9" font-weight="bold" fill="#15803d">ECG leads</text>
  <text x="57" y="319" font-size="9" fill="#15803d">E1 · E2 · E3</text>

  <!-- ICG sense label -->
  <rect x="225" y="288" width="60" height="18" rx="3" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="255" y="300" text-anchor="middle" font-size="9" fill="#2563eb">ICG sense</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- DIVIDER                                       -->
  <!-- ══════════════════════════════════════════════ -->
  <line x1="462" y1="68" x2="462" y2="560" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Through-body arrows -->
  <text x="462" y="298" text-anchor="middle" font-size="20" fill="#dc2626">⟵</text>
  <text x="462" y="315" text-anchor="middle" font-size="9" fill="#dc2626">ICG current</text>
  <text x="462" y="326" text-anchor="middle" font-size="9" fill="#dc2626">through thorax</text>
  <text x="462" y="348" text-anchor="middle" font-size="20" fill="#7c3aed">⟵</text>
  <text x="462" y="365" text-anchor="middle" font-size="9" fill="#7c3aed">RLD drive</text>
  <text x="462" y="376" text-anchor="middle" font-size="9" fill="#7c3aed">to back</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- BACK VIEW                                     -->
  <!-- ══════════════════════════════════════════════ -->

  <text x="710" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#334155">BACK</text>

  <!-- Head (back) -->
  <ellipse cx="710" cy="118" rx="42" ry="50" fill="#dfc5a0" stroke="#b0a090" stroke-width="1.5"/>

  <!-- Neck (back) -->
  <path d="M 693 165 L 727 165 L 731 200 L 689 200 Z" fill="#dfc5a0" stroke="#b0a090" stroke-width="1.5"/>

  <!-- Torso (back) -->
  <path d="
    M 689 200
    Q 663 204 633 215
    Q 595 232 587 295
    L 587 490
    Q 620 520 710 522
    Q 800 520 823 490
    L 823 295
    Q 815 232 777 215
    Q 747 204 731 200
    Z
  " fill="#dfc5a0" stroke="#b0a090" stroke-width="1.5"/>

  <!-- Spine -->
  <line x1="710" y1="200" x2="710" y2="500" stroke="#c8b090" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Shoulder blades -->
  <path d="M 643 238 Q 662 232 672 263 Q 667 298 652 308 Q 634 297 631 268 Z" fill="#d0b898" stroke="none"/>
  <path d="M 777 238 Q 758 232 748 263 Q 753 298 768 308 Q 786 297 789 268 Z" fill="#d0b898" stroke="none"/>

  <!-- ── Current lead wire (red dashed) ── -->
  <line x1="710" y1="213" x2="710" y2="410" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8,5"/>

  <!-- Current flow arrows -->
  <polygon points="710,285 703,270 717,270" fill="#dc2626"/>
  <polygon points="710,365 717,380 703,380" fill="#dc2626"/>

  <!-- ── RLD wire (purple dashed, parallel to current wire) ── -->
  <line x1="720" y1="213" x2="720" y2="410" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5,5"/>

  <!-- ── E4: Neck electrode ── -->
  <circle cx="710" cy="197" r="18" fill="#dc2626" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="710" y="192" text-anchor="middle" font-size="8" font-weight="bold" fill="white">E4 NECK</text>
  <text x="710" y="203" text-anchor="middle" font-size="8" fill="white">I⁺ · RLD</text>

  <!-- ── E5: Lower back electrode ── -->
  <circle cx="710" cy="424" r="18" fill="#dc2626" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="710" y="419" text-anchor="middle" font-size="8" font-weight="bold" fill="white">E5 BACK</text>
  <text x="710" y="430" text-anchor="middle" font-size="8" fill="white">I⁻ · RLD</text>

  <!-- Label E4 -->
  <rect x="500" y="178" width="168" height="40" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="508" y="194" font-size="11" font-weight="bold" fill="#b91c1c">E4 · Nape of neck</text>
  <text x="508" y="208" font-size="10" fill="#b91c1c">ICG I⁺  ·  ECG RLD reference</text>
  <line x1="668" y1="194" x2="692" y2="194" stroke="#b91c1c" stroke-width="1.2"/>

  <!-- Label E5 -->
  <rect x="500" y="406" width="168" height="40" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="508" y="422" font-size="11" font-weight="bold" fill="#b91c1c">E5 · Lower back</text>
  <text x="508" y="436" font-size="10" fill="#b91c1c">ICG I⁻  ·  ECG RLD reference</text>
  <line x1="668" y1="422" x2="692" y2="422" stroke="#b91c1c" stroke-width="1.2"/>

  <!-- ICG current label -->
  <rect x="726" y="278" width="90" height="30" rx="4" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="771" y="291" text-anchor="middle" font-size="9" font-weight="bold" fill="#c2410c">1 mA · 32 kHz</text>
  <text x="771" y="302" text-anchor="middle" font-size="9" fill="#c2410c">constant current</text>

  <!-- RLD label on back wire -->
  <rect x="726" y="330" width="90" height="20" rx="3" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="771" y="343" text-anchor="middle" font-size="9" fill="#7c3aed">RLD driven signal</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- ELECTRODE SUMMARY TABLE                       -->
  <!-- ══════════════════════════════════════════════ -->

  <rect x="20" y="568" width="940" height="175" rx="7" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>

  <text x="40" y="588" font-size="12" font-weight="bold" fill="#334155">Electrode Summary</text>

  <!-- Header row -->
  <rect x="30" y="594" width="920" height="18" rx="2" fill="#e2e8f0"/>
  <text x="50"  y="607" font-size="10" font-weight="bold" fill="#475569">ID</text>
  <text x="100" y="607" font-size="10" font-weight="bold" fill="#475569">Location</text>
  <text x="300" y="607" font-size="10" font-weight="bold" fill="#475569">Side</text>
  <text x="380" y="607" font-size="10" font-weight="bold" fill="#475569">ICG role</text>
  <text x="540" y="607" font-size="10" font-weight="bold" fill="#475569">ECG / other role</text>
  <text x="720" y="607" font-size="10" font-weight="bold" fill="#475569">Lead wires</text>

  <!-- Row E1 -->
  <circle cx="50" cy="623" r="6" fill="#2563eb"/>
  <text x="60"  y="627" font-size="10" fill="#1e293b">E1</text>
  <text x="100" y="627" font-size="10" fill="#1e293b">Between collarbones (front)</text>
  <text x="300" y="627" font-size="10" fill="#1e293b">Front</text>
  <text x="380" y="627" font-size="10" fill="#1e293b">Vsense⁺  (device body)</text>
  <text x="540" y="627" font-size="10" fill="#1e293b">ECG electrode (device body)</text>
  <text x="720" y="627" font-size="10" fill="#1e293b">None — device IS this electrode</text>

  <!-- Row E2 -->
  <circle cx="50" cy="641" r="6" fill="#0284c7"/>
  <text x="60"  y="645" font-size="10" fill="#1e293b">E2</text>
  <text x="100" y="645" font-size="10" fill="#1e293b">Solar plexus (front, centre)</text>
  <text x="300" y="645" font-size="10" fill="#1e293b">Front</text>
  <text x="380" y="645" font-size="10" fill="#1e293b">Vsense⁻</text>
  <text x="540" y="645" font-size="10" fill="#1e293b">ECG electrode</text>
  <text x="720" y="645" font-size="10" fill="#1e293b">1 lead wire from device</text>

  <!-- Row E3 -->
  <circle cx="50" cy="659" r="6" fill="#7c3aed"/>
  <text x="60"  y="663" font-size="10" fill="#1e293b">E3</text>
  <text x="100" y="663" font-size="10" fill="#1e293b">Lower left rib (front, left)</text>
  <text x="300" y="663" font-size="10" fill="#1e293b">Front</text>
  <text x="380" y="663" font-size="10" fill="#1e293b">—</text>
  <text x="540" y="663" font-size="10" fill="#1e293b">ECG electrode only</text>
  <text x="720" y="663" font-size="10" fill="#1e293b">1 lead wire from device</text>

  <!-- Row E4 -->
  <circle cx="50" cy="677" r="6" fill="#dc2626"/>
  <text x="60"  y="681" font-size="10" fill="#1e293b">E4</text>
  <text x="100" y="681" font-size="10" fill="#1e293b">Nape of neck (back)</text>
  <text x="300" y="681" font-size="10" fill="#1e293b">Back</text>
  <text x="380" y="681" font-size="10" fill="#1e293b">Current injection I⁺</text>
  <text x="540" y="681" font-size="10" fill="#1e293b">ECG RLD (driven right leg)</text>
  <text x="720" y="681" font-size="10" fill="#1e293b">1 lead wire from device</text>

  <!-- Row E5 -->
  <circle cx="50" cy="695" r="6" fill="#dc2626"/>
  <text x="60"  y="699" font-size="10" fill="#1e293b">E5</text>
  <text x="100" y="699" font-size="10" fill="#1e293b">Lower back (back)</text>
  <text x="300" y="699" font-size="10" fill="#1e293b">Back</text>
  <text x="380" y="699" font-size="10" fill="#1e293b">Current injection I⁻</text>
  <text x="540" y="699" font-size="10" fill="#1e293b">ECG RLD (driven right leg)</text>
  <text x="720" y="699" font-size="10" fill="#1e293b">1 lead wire from device</text>

  <!-- Row E6 -->
  <circle cx="50" cy="713" r="6" fill="#be185d"/>
  <text x="60"  y="717" font-size="10" fill="#1e293b">E6</text>
  <text x="100" y="717" font-size="10" fill="#1e293b">Left chest (front) — SCL pair</text>
  <text x="300" y="717" font-size="10" fill="#1e293b">Front</text>
  <text x="380" y="717" font-size="10" fill="#1e293b">—</text>
  <text x="540" y="717" font-size="10" fill="#1e293b">SCL/EDA excitation / sense (Ag/AgCl)</text>
  <text x="720" y="717" font-size="10" fill="#1e293b">1 lead wire from device</text>

  <!-- Row E7 -->
  <circle cx="50" cy="731" r="6" fill="#db2777"/>
  <text x="60"  y="735" font-size="10" fill="#1e293b">E7</text>
  <text x="100" y="735" font-size="10" fill="#1e293b">Left chest (front) — SCL pair, ~2 cm</text>
  <text x="300" y="735" font-size="10" fill="#1e293b">Front</text>
  <text x="380" y="735" font-size="10" fill="#1e293b">—</text>
  <text x="540" y="735" font-size="10" fill="#1e293b">SCL/EDA excitation / sense (Ag/AgCl)</text>
  <text x="720" y="735" font-size="10" fill="#1e293b">1 lead wire from device</text>

</svg>
